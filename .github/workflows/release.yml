name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Zip release
        run: Compress-Archive -Path ./publish/VPinDisplayFix.exe, ./README.md -DestinationPath ./VPinDisplayFix.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: VPinDisplayFix.zip
          generate_release_notes: true
